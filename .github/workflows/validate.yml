---
name: Validate

"on":
  push:
    tags-ignore:
      - "v*"
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  addon-linter:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run add-on linter
        uses: frenck/action-addon-linter@v2
        with:
          path: .

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run YAMLLint
        uses: frenck/action-yamllint@v1.5

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          additional_files: run.sh

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Lint Dockerfile
        run: docker run --rm -i hadolint/hadolint:v2.12.0-alpine < Dockerfile
