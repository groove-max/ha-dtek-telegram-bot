name: Unit Tests

on:
  push:
    tags-ignore:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Compile add-on sources
        run: python -m compileall rootfs/app tests
