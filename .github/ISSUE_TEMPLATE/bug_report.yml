---
name: Bug report
description: Report a reproducible problem in the DTEK Telegram Bot add-on
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this template for issues in the add-on itself.

        If the problem is caused by missing or incorrect DTEK entities,
        also verify your `ha-dtek-monitor` setup first.

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "2026.4.0"
    validations:
      required: true

  - type: input
    id: addon_version
    attributes:
      label: Add-on version
      placeholder: "0.3.0"
    validations:
      required: true

  - type: dropdown
    id: install_type
    attributes:
      label: Installation type
      options:
        - Home Assistant OS
        - Home Assistant Supervised
        - Other
    validations:
      required: true

  - type: dropdown
    id: affected_area
    attributes:
      label: Affected area
      options:
        - Telegram delivery
        - Power detection
        - DTEK outage updates
        - Schedule / upcoming outage
        - Status message
        - Ingress UI
        - Import / export
        - Template system
        - Build / startup
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the actual behavior and why it is wrong.
      placeholder: >-
        The add-on sent a false power-loss notification while voltage was
        still present.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: The add-on should have kept the house state as `on`.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure address with loss_plus_voltage
        2. Use sensor X as loss_entity
        3. Wait for sensor Y to go unavailable for 2 seconds
        4. Observe Telegram notifications
    validations:
      required: true

  - type: textarea
    id: config_context
    attributes:
      label: Relevant config context
      description: >-
        Remove secrets. Include only the relevant address, power mode, and
        sensor choices.
      render: yaml

  - type: textarea
    id: entity_states
    attributes:
      label: Relevant Home Assistant entity states
      description: >-
        Include the relevant `ha-dtek-monitor` entities and local sensors.
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Add-on logs
      description: Paste the relevant log excerpt. Remove secrets if needed.
      render: text

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: >-
        Screenshots, Telegram messages, diagnostics output, or anything else
        that helps.
